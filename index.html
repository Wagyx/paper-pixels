<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Place puzzle pieces on a square grid and export your layouts.">
  <meta name="theme-color" content="#3d6b5a">
  <meta name="color-scheme" content="light">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Paper Pixels">
  <title>Paper Pixels — Grid Editor</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <h1 class="logo">
        <img src="icons/icon.svg" alt="" class="logo-icon" width="32" height="32" aria-hidden="true">
        <span class="logo-title">Paper Pixels</span>
        <span class="logo-version" id="appVersion"></span>
      </h1>
      <div class="selection-tools hidden" id="selectionTools">
        <label class="color-label">
          Color
          <input type="color" id="colorPicker" value="#e85d5d">
        </label>
        <button type="button" class="btn btn-danger" id="deleteBtn">Delete</button>
      </div>
      <p class="hint">Place with left click · Select pieces · Drag to move · Right drag to pan · Ctrl+right drag to zoom · Scroll or ↑↓ for variant · ←→ for piece type</p>
    </header>

    <main class="viewport-wrap">
      <div class="piece-panel">
        <div class="piece-selector" role="group" aria-label="Piece type">
          <button type="button" class="piece-btn active" data-type="2x2" title="2×2 — choose connector variant">
            <span class="piece-thumb" aria-hidden="true"></span>
            <span class="piece-label">2×2</span>
          </button>
          <button type="button" class="piece-btn" data-type="2x1" title="2×1 — choose connector variant">
            <span class="piece-thumb" aria-hidden="true"></span>
            <span class="piece-label">2×1</span>
          </button>
          <button type="button" class="piece-btn" data-type="1x2" title="1×2 — choose connector variant">
            <span class="piece-thumb" aria-hidden="true"></span>
            <span class="piece-label">1×2</span>
          </button>
          <button type="button" class="piece-btn" data-type="1x1" title="1×1 — choose connector variant">
            <span class="piece-thumb" aria-hidden="true"></span>
            <span class="piece-label">1×1</span>
          </button>
        </div>
      </div>
      <svg id="gridSvg" class="grid-svg" aria-label="Grid editor">
        <g id="world">
          <g id="gridLayer" class="grid-layer"></g>
          <g id="piecesLayer" class="pieces-layer">
            <g id="piecesBodiesLayer" class="pieces-bodies-layer"></g>
            <g id="piecesFemaleConnectorsLayer" class="pieces-female-layer"></g>
            <g id="piecesMaleConnectorsLayer" class="pieces-male-layer"></g>
            <g id="piecesRingsLayer" class="pieces-rings-layer"></g>
          </g>
          <g id="previewLayer" class="preview-layer"></g>
        </g>
      </svg>
      <div class="viewport-controls">
        <button type="button" class="btn btn-float" id="recenterBtn" title="Center view on all pieces">
          Recenter
        </button>
        <label class="view-option view-option-float">
          <input type="checkbox" id="showGrid" checked>
          Show grid
        </label>
        <label class="view-option view-option-float">
          <input type="checkbox" id="showConnectors" checked>
          Show connectors
        </label>
        <div class="io-tools">
          <button type="button" class="btn btn-float" id="solveBtn" title="Set all pieces to all-female variants, then upgrade to valid variants with male connectors">Solve</button>
          <button type="button" class="btn btn-float" id="summaryBtn" title="Summary of pieces by type, variant and color">Summary</button>
          <button type="button" class="btn btn-float" id="exportBtn" title="Download layout as JSON">Export</button>
          <button type="button" class="btn btn-float" id="importBtn" title="Load layout from JSON file">Import</button>
          <input type="file" id="importFileInput" class="sr-only" accept=".json,application/json" aria-hidden="true" tabindex="-1">
        </div>
      </div>
    </main>
  </div>

  <script src="js/pwa.js" defer></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
